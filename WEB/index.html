    <script language = "Javascript">
       var images = ["CivilizationOfHegemony.png", "HappyBirthday.png", "COMINGSOON.jpg"];
    var count = 0;
    function previousImage() 
    {
        
        if(count!=0)
            count--;
        var id = document.getElementById("imageId");
        id.src = "src/Banner/" + images[count];
    }
    function nextImage() {
        
        if(count!=2)
            count++;
        var id = document.getElementById("imageId");
        id.src = "src/Banner/" + images[count];
    }
    </script>
